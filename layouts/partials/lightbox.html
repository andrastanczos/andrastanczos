<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav prev" onclick="navLightbox(-1); event.stopPropagation();">←</button>
  <button class="lightbox-nav next" onclick="navLightbox(1); event.stopPropagation();">→</button>
  <div class="lightbox-img-wrap" id="lightboxImgWrap"></div>
  <div class="lightbox-exif" id="lightboxExif"></div>
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>
